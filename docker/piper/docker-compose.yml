---
services:
  piper:
    image: lscr.io/linuxserver/piper:latest
    container_name: piper
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - PIPER_VOICE=en_US-lessac-medium
      - PIPER_LENGTH=1.0 #optional
      - PIPER_NOISE=0.667 #optional
      - PIPER_NOISEW=0.333 #optional
      - PIPER_SPEAKER=0 #optional
      - PIPER_PROCS=1 #optional
    volumes:
      - /home/serveradmin/piper/config:/config
    ports:
      - 10200:10200
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.piper.entrypoints=http'
      - 'traefik.http.routers.piper.rule=Host(`piper.local.gregdyer.ca`)'
      - 'traefik.http.middlewares.piper-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.piper.middlewares=piper-https-redirect'
      - 'traefik.http.routers.piper-secure.entrypoints=https'
      - 'traefik.http.routers.piper-secure.rule=Host(`piper.local.gregdyer.ca`)'
      - 'traefik.http.routers.piper-secure.tls=true'
      - 'traefik.http.routers.piper-secure.service=piper'
      - 'traefik.http.services.piper.loadbalancer.server.port=10200'
      - 'traefik.docker.network=proxy'

networks:
  proxy:
    external: true
