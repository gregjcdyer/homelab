api:
  dashboard: true
  debug: true
entryPoints:
  http:
    address: ':80'
  https:
    address: ':443'
  k3s-api:
    address: ':6443'
serversTransport:
  insecureSkipVerify: true
providers:
  docker:
    endpoint: 'unix:///var/run/docker.sock'
    exposedByDefault: false
  file:
    directory: /configs
    watch: true
certificatesResolvers:
  cloudflare:
    acme:
      email: <EMAIL>
      storage: acme.json
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - '1.1.1.1:53'
          - '1.0.0.1:53'
