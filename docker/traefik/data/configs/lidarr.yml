http:
  routers:
    lidarr:
      entryPoints:
        - 'https'
      rule: 'Host(`lidarr.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: lidarr
  services:
    lidarr:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:8686'
        passHostHeader: true
