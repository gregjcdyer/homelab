http:
  routers:
    homepage:
      entryPoints:
        - 'https'
      rule: 'Host(`homepage.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: homepage
  services:
    homepage:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:3000'
        passHostHeader: true
