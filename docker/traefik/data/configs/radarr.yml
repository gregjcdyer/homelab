http:
  routers:
    radarr:
      entryPoints:
        - 'https'
      rule: 'Host(`radarr.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: radarr
  services:
    radarr:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:7878'
        passHostHeader: true
