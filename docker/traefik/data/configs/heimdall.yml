http:
  routers:
    heimdall:
      entryPoints:
        - 'https'
      rule: 'Host(`heimdall.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: heimdall
  services:
    heimdall:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.64:10000'
        passHostHeader: true
