http:
  routers:
    piper:
      entryPoints:
        - 'https'
      rule: 'Host(`piper.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: piper
  services:
    piper:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:10200'
        passHostHeader: true
