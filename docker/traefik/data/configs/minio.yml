http:
  routers:
    minio:
      entryPoints:
        - 'https'
      rule: 'Host(`minio.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: minio
  services:
    minio:
      loadBalancer:
        servers:
          - url: 'https://192.168.0.200'
        passHostHeader: true
