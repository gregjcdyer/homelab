        passHostHeader: true
    unifi:
      loadBalancer:
        servers:
          - url: 'https://192.168.0.60:8443'
        passHostHeader: true

    rancher-service:
      loadBalancer:
        servers:
          # We connect to K3s on 443, but we must tell Traefik to ignore K3s's self-signed cert
          - url: 'https://192.168.0.66:443'
          - url: 'https://192.168.0.67:443'
        passHostHeader: true

  #endregion

  middlewares:
    addprefix-pihole:
      addPrefix:
        prefix: '/admin'
    https-redirect:
      redirectScheme:
        scheme: https

    default-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        contentTypeNosniff: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    idrac:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsSeconds: 15552000
        customFrameOptionsValue: SAMEORIGIN
        customRequestHeaders:
          X-Forwarded-Proto: https

    default-whitelist:
      ipWhiteList:
        sourceRange:
          - '10.0.0.0/8'
          - '192.168.0.0/16'
          - '172.16.0.0/12'

    secured:
      chain:
        middlewares:
          - default-whitelist
          - default-headers
tcp:
  routers:
    k3s-api:
      rule: 'HostSNI(`*`)'
      entryPoints:
        - 'k3s-api' # Usually port 6443
      service: 'k3s-api-nodes'
      tls:
        passthrough: true # CRITICAL: Lets K3s handle the self-signed certs

  services:
    k3s-api-nodes:
      loadBalancer:
        servers:
          - address: '192.168.0.66:6443'
          - address: '192.168.0.67:6443'
