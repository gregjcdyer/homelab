http:
  routers:
    synology:
      entryPoints:
        - 'https'
      rule: 'Host(`landfill.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: synology
  services:
    synology:
      loadBalancer:
        servers:
          - url: 'https://192.168.0.12:5001'
        passHostHeader: true
