http:
  routers:
    sonarr:
      entryPoints:
        - 'https'
      rule: 'Host(`sonarr.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: sonarr
  services:
    sonarr:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:8989'
        passHostHeader: true
