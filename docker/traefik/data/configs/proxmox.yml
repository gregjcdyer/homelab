http:
  routers:
    proxmox:
      entryPoints:
        - 'https'
      rule: 'Host(`proxmox.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: proxmox
  services:
    proxmox:
      loadBalancer:
        servers:
          - url: 'https://192.168.0.13:8006'
        passHostHeader: true
