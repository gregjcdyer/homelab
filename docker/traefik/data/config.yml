        passHostHeader: true
    ollama:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:8080'
        passHostHeader: true
    piper:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:10200'
        passHostHeader: true
    whisper:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:10300'
        passHostHeader: true
    jackett:
      loadBalancer:
