http:
  routers:
    transmission:
      entryPoints:
        - 'https'
      rule: 'Host(`transmission.local.gregdyer.ca`)'
      middlewares:
        - default-headers
      tls: {}
      service: transmission
  services:
    transmission:
      loadBalancer:
        servers:
          - url: 'http://192.168.0.60:9091'
        passHostHeader: true
