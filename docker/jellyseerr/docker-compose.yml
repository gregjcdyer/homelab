---
services:
  jellyseerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=America/Vancouver
    ports:
      - 5065:5055
    volumes:
      - /home/serveradmin/jellyseerr/config:/app/config
    restart: unless-stopped
