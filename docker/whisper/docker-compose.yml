---
services:
  faster-whisper:
    image: lscr.io/linuxserver/faster-whisper:latest
    container_name: faster-whisper
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WHISPER_MODEL=tiny-int8
      - WHISPER_BEAM=1 #optional
      - WHISPER_LANG=en #optional
    volumes:
      - /home/serveradmin/whisper/config:/config
    ports:
      - 10300:10300
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.whisper.entrypoints=http'
      - 'traefik.http.routers.whisper.rule=Host(`whisper.local.gregdyer.ca`)'
      - 'traefik.http.middlewares.whisper-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.whisper.middlewares=whisper-https-redirect'
      - 'traefik.http.routers.whisper-secure.entrypoints=https'
      - 'traefik.http.routers.whisper-secure.rule=Host(`whisper.local.gregdyer.ca`)'
      - 'traefik.http.routers.whisper-secure.tls=true'
      - 'traefik.http.routers.whisper-secure.service=whisper'
      - 'traefik.http.services.whisper.loadbalancer.server.port=10300'
      - 'traefik.docker.network=proxy'

networks:
  proxy:
    external: true
